name: hopper

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bug}
      POSTGRES_DB: ${POSTGRES_DB:-hopper}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bug} -d ${POSTGRES_DB:-hopper}"]
      interval: 3s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      # Keep models pinned in RAM so the first call after idle isn't a 5-15s
      # cold-load. Default is 5m which makes demos feel sluggish.
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    build:
      context: ./apps/api
      target: dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://bug:bug@db:5432/hopper}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_GEN_MODEL: ${OLLAMA_GEN_MODEL:-llama3.2:3b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_CHANNEL: ${SLACK_CHANNEL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_CHANNEL_NAME: ${SLACK_CHANNEL_NAME:-#bugs-triage}
      PORT: ${PORT:-3000}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/src
      - api-uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      target: dev
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
      - ./apps/web/index.html:/app/index.html

volumes:
  db-data:
  ollama-data:
  api-uploads:
